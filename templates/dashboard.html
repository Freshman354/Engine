<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Lumvi Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
            --cream:#F7F4EF;--cream2:#F0EBE1;--panel:#EDEAE3;
            --gold:#B8924A;--gold-lt:rgba(184,146,74,0.12);--gold-dk:#9A7A3A;
            --dark:#1C1917;--mid:#57534E;--sub:#A8A29E;--border:#E7E2DA;--white:#FFFFFF;
            --success:#16A34A;--success-lt:#F0FDF4;
            --danger:#EF4444;--danger-lt:#FEF2F2;
            --warning:#D97706;--warning-lt:#FFFBEB;
            --sidebar-w:224px;
        }
        body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;display:flex;}
        
        /* Sidebar Styles */
        .sidebar{width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform 0.3s ease;}
        .sidebar-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
        .logo-img{width:34px;height:34px;border-radius:9px;object-fit:cover;flex-shrink:0;}
        .logo-text{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--dark);}
        .sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
        .nav-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--sub);padding:10px 10px 4px;margin-top:6px;}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;text-decoration:none;color:var(--mid);font-size:13.5px;font-weight:500;transition:all 0.15s;cursor:pointer;}
        .nav-item:hover{background:var(--cream);color:var(--dark);}
        .nav-item.active{background:var(--gold-lt);color:var(--gold-dk);font-weight:600;}
        .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.65;}
        .nav-badge{margin-left:auto;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;}
        .sidebar-footer{padding:14px 12px;border-top:1px solid var(--border);}
        .user-profile{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background 0.15s;}
        .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
        .user-info{flex:1;min-width:0;}
        .user-name{font-size:13px;font-weight:600;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

        /* Layout & Main Content */
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh;}
        .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
        .page-content{padding:28px;}
        
        /* AGENCY HIERARCHY STYLES */
        .client-info-stack { display: flex; flex-direction: column; }
        .staff-hierarchy { margin-top: 6px; padding-left: 12px; }
        .staff-node { font-family: 'DM Mono', monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; color: var(--mid); margin-bottom: 2px; }
        .node-line { color: var(--border); font-weight: bold; }
        .node-role { text-transform: uppercase; font-weight: 700; color: var(--gold); font-size: 9px; background: var(--gold-lt); padding: 1px 4px; border-radius: 4px; }
        .staff-node.empty { opacity: 0.5; font-style: italic; }

        /* Stats & Cards */
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
        .stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
        .stat-label{font-size:12px;color:var(--sub);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
        .stat-value{font-size:26px;font-weight:700;font-family:'Fraunces',serif;}
        
        /* Tables */
        .clients-table-wrap{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
        .clients-table{width:100%;border-collapse:collapse;}
        .clients-table th{padding:12px 20px;text-align:left;font-size:11px;color:var(--sub);text-transform:uppercase;background:var(--cream);}
        .clients-table td{padding:16px 20px;border-bottom:1px solid var(--border);vertical-align:top;}
        .client-avatar-sm{width:36px;height:36px;border-radius:10px;background:var(--gold-lt);border:1px solid rgba(184,146,74,0.2);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;color:var(--gold-dk);flex-shrink:0;}
        
        /* Buttons */
        .btn{padding:9px 16px;border-radius:9px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:13px;border:none;font-family:'DM Sans',sans-serif;}
        .btn-primary{background:var(--gold);color:#fff;}
        .btn-xs{padding:5px 10px;font-size:11.5px;border-radius:7px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:4px;border:none;font-family:'DM Sans',sans-serif;}
        .btn-xs-manage{background:var(--gold-lt);color:var(--gold-dk);}
        .btn-xs-logins{background:rgba(184,146,74,0.1);color:var(--gold-dk);}
        .btn-xs-embed{background:#fdf2f8;color:#9d174d;}
        .btn-xs-delete{background:var(--danger-lt);color:var(--danger);}

        /* Modals */
        .modal{display:none;position:fixed;inset:0;background:rgba(28,25,23,0.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:16px;}
        .modal-content{background:var(--white);border-radius:20px;padding:28px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
        .modal-header{display:flex;justify-content:space-between;margin-bottom:20px;}
        .form-group{margin-bottom:18px;}
        .form-group label{display:block;font-size:11px;font-weight:600;color:var(--mid);margin-bottom:6px;text-transform:uppercase;}
        .form-group input, .form-group select{width:100%;padding:11px 14px;background:var(--cream);border:1.5px solid var(--border);border-radius:9px;outline:none;}
        
        .vertical-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px;}
        .vertical-card{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:0.2s;}
        .vertical-card.selected{border-color:var(--gold);background:var(--gold-lt);}

        /* Toast */
        .toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;z-index:9999;opacity:0;transition:0.3s;}
        .toast.show{opacity:1;}
        .toast.success{background:var(--success);}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <span class="logo-text">Lumvi Agency</span>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-label">Main</div>
        <a href="#" class="nav-item active">Dashboard <span class="nav-badge">3</span></a>
        <a href="#" class="nav-item">Settings</a>
    </nav>
</aside>

<div class="main">
    <div class="topbar">
        <span style="font-family:'Fraunces'; font-weight:600;">Agency Control Panel</span>
        <button class="btn btn-primary" onclick="openNewClientModal()">+ New Client Business</button>
    </div>

    <div class="page-content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Client Businesses</div>
                <div class="stat-value">12</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Staff Logins</div>
                <div class="stat-value">24</div>
            </div>
        </div>

        <div class="clients-table-wrap">
            <table class="clients-table">
                <thead>
                    <tr>
                        <th>Client Structure</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="client-cell">
                                <div class="client-avatar-sm">A</div>
                                <div class="client-info-stack">
                                    <div style="font-weight:700;">Acme Corp</div>
                                    <div class="staff-hierarchy">
                                        <div class="staff-node">
                                            <span class="node-line">└─</span>
                                            <span class="node-role">Manager</span>
                                            <span class="node-email">sarah@acme.com</span>
                                        </div>
                                        <div class="staff-node">
                                            <span class="node-line">└─</span>
                                            <span class="node-role">Support</span>
                                            <span class="node-email">mike@acme.com</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </td>
                        <td><span style="color:var(--success); font-size:12px; font-weight:700;">● Active</span></td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="btn-xs btn-xs-logins" onclick="openStaffModal('CL-101', 'Acme Corp')">+ Add Staff</button>
                                <button class="btn-xs btn-xs-manage">Manage Bot</button>
                                <button class="btn-xs btn-xs-delete">Delete</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal" id="staff-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h2 style="font-family:'Fraunces'">Add Client Staff</h2>
                <p id="staff-subtitle" style="font-size:12px; color:var(--sub)"></p>
            </div>
            <button style="border:none; background:none; font-size:20px; cursor:pointer;" onclick="closeModal('staff-modal')">×</button>
        </div>
        <form id="addStaffForm" onsubmit="submitStaff(event)">
            <input type="hidden" id="target-client-id">
            <div class="form-group">
                <label>Staff Email</label>
                <input type="email" id="staff-email" required placeholder="staff@client.com">
            </div>
            <div class="form-group">
                <label>Access Level</label>
                <div class="vertical-grid">
                    <div class="vertical-card selected" id="role-manager" onclick="setRole('manager')">
                        <div style="font-size:20px">🔑</div>
                        <div style="font-weight:700; font-size:12px">Manager</div>
                    </div>
                    <div class="vertical-card" id="role-support" onclick="setRole('support')">
                        <div style="font-size:20px">💬</div>
                        <div style="font-weight:700; font-size:12px">Support</div>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Create Invitation</button>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let currentRole = 'manager';

    function openStaffModal(id, name) {
        document.getElementById('target-client-id').value = id;
        document.getElementById('staff-subtitle').innerText = `Assign login for ${name}`;
        document.getElementById('staff-modal').style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function setRole(role) {
        currentRole = role;
        document.getElementById('role-manager').classList.toggle('selected', role === 'manager');
        document.getElementById('role-support').classList.toggle('selected', role === 'support');
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = "toast success show";
        setTimeout(() => t.className = "toast", 3000);
    }

    async function submitStaff(e) {
        e.preventDefault();
        const data = {
            client_id: document.getElementById('target-client-id').value,
            email: document.getElementById('staff-email').value,
            role: currentRole
        };
        
        console.log("Sending to Python:", data);
        showToast("Staff login created!");
        closeModal('staff-modal');
        // You would typically use fetch('/api/staff', {method:'POST', body: JSON.stringify(data)}) here
    }

    // Close modals on background click
    window.onclick = function(event) {
        if (event.target.className === 'modal') {
            event.target.style.display = 'none';
        }
    }
</script>

</body>
</html>
