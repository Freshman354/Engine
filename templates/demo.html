<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumvi — Product Walkthrough</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Config ── update to your live URL ─────────────────── */
    const SIGNUP_URL = "/signup";

    /* ── Design Tokens ─────────────────────────────────────── */
    const C = {
      cream:"#F7F4EF", panel:"#EDEAE3",
      gold:"#B8924A", goldDk:"#9A7A3A", goldLt:"rgba(184,146,74,0.12)",
      dark:"#1C1917", mid:"#57534E", sub:"#A8A29E", border:"#E7E2DA", white:"#FFFFFF",
      success:"#16A34A", successLt:"#F0FDF4",
      warning:"#D97706", warningLt:"#FFFBEB",
    };

    /* ── CSS ────────────────────────────────────────────────── */
    const CSS = `
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: 'DM Sans', sans-serif; }
    @keyframes slideFromRight { from { opacity:0; transform:translateX(32px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideFromLeft  { from { opacity:0; transform:translateX(-32px); } to { opacity:1; transform:translateX(0); } }
    @keyframes fadeRise        { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes glow { 0%,100% { box-shadow:0 0 0 0 rgba(184,146,74,0); } 50% { box-shadow:0 0 0 9px rgba(184,146,74,0.22); } }
    .anim-fwd  { animation: slideFromRight 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    .anim-bwd  { animation: slideFromLeft  0.4s cubic-bezier(0.22,1,0.36,1) forwards; }
    .anim-rise { animation: fadeRise 0.38s cubic-bezier(0.22,1,0.36,1) forwards; }
    .pulse     { animation: glow 2.2s ease-in-out infinite; border-radius: inherit; }
    a.cta { display:inline-flex; align-items:center; justify-content:center; text-decoration:none; }
    a.cta:hover { opacity: 0.9; transform: translateY(-1px); transition: all 0.18s; }
    @media (max-width: 820px) {
      body { overflow-y: auto !important; }
      .demo-root  { height:auto !important; min-height:100vh; overflow:visible !important; }
      .demo-shell { flex-direction:column !important; overflow:visible !important; height:auto !important; }
      .left-col   { width:100% !important; border-right:none !important; border-bottom:1px solid #E7E2DA !important; padding:20px !important; }
      .right-col  { flex:none !important; height:300px !important; padding:10px !important; }
      .ghost-num  { font-size:60px !important; }
      .kb-hint    { display:none !important; }
      .step-title { font-size:22px !important; }
      .step-copy  { font-size:13px !important; }
      .left-spacer { display:none !important; }
      .hdr-sub     { display:none !important; }
    }
    @media (max-width: 480px) {
      .right-col { height:260px !important; }
      .step-title { font-size:19px !important; }
    }
    `;

    /* ── Steps ──────────────────────────────────────────────── */
    const STEPS = [
      { n:"01", tag:"Getting Started", title:"Sign up",             time:"60 seconds", copy:"No card. No commitment. Just your email and agency name.",                                                           url:"lumvi.net/signup" },
      { n:"02", tag:"Build Your Bot",  title:"Build your bot",                         copy:"Give it a name. Set the tone. Make it sound like it belongs to your client — because it will.",                     url:"lumvi.net/onboarding" },
      { n:"03", tag:"Knowledge Base",  title:"Feed it the business",                   copy:"Paste FAQs. Upload docs. Add URLs. The bot learns the client's world in minutes.",                                  url:"lumvi.net/onboarding" },
      { n:"04", tag:"Customization",   title:"Make it yours",                          copy:"Your logo. Your colors. Your chat bubble. Lumvi never appears anywhere your client can see.",                       url:"lumvi.net/customize" },
      { n:"05", tag:"Deployment",      title:"One line of code",                       copy:"Copy. Paste before </body>. That's the entire technical requirement.",                                              url:"lumvi.net/onboarding" },
      { n:"06", tag:"Results",         title:"Get paid",                               copy:"Leads, conversations, and analytics hit your dashboard. Your client sees results. You send the invoice.",           url:"lumvi.net/analytics" },
    ];

    /* ── Wizard Shell ───────────────────────────────────────── */
    function WizShell({ wiz, title, sub, children }) {
      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:C.cream}}>
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 14px",height:36,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <div style={{width:22,height:22,background:C.gold,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <span style={{fontFamily:"Fraunces,serif",fontSize:12,fontWeight:700,color:C.dark}}>Lumvi</span>
            </div>
            <span style={{fontSize:9,color:C.sub,padding:"2px 8px",border:`1px solid ${C.border}`,borderRadius:5,cursor:"pointer"}}>Skip →</span>
          </div>
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"9px 14px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:0,marginBottom:6}}>
              {[0,1,2,3,4].map(i => (
                <div key={i} style={{display:"flex",alignItems:"center"}}>
                  <div style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${i<wiz?C.success:i===wiz?C.gold:C.border}`,background:i<wiz?C.success:i===wiz?C.gold:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,color:i<=wiz?"#fff":C.sub,transition:"all 0.3s"}}>
                    {i<wiz?"✓":i+1}
                  </div>
                  {i<4 && <div style={{width:22,height:2,background:i<wiz?C.success:C.border,transition:"background 0.3s"}} />}
                </div>
              ))}
            </div>
            <div style={{height:2,background:C.panel,borderRadius:1,maxWidth:220,margin:"0 auto",overflow:"hidden"}}>
              <div style={{width:`${(wiz/4)*100}%`,height:"100%",background:C.gold,borderRadius:1,transition:"width 0.4s ease"}} />
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
            <div style={{maxWidth:430,margin:"0 auto"}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",color:C.gold,marginBottom:5}}>Step {wiz+1} of 5</div>
              <h2 style={{fontFamily:"Fraunces,serif",fontSize:19,fontWeight:700,color:C.dark,marginBottom:4,letterSpacing:"-0.3px"}}>{title}</h2>
              {sub && <p style={{fontSize:11,color:C.mid,marginBottom:12,lineHeight:1.5}}>{sub}</p>}
              {children}
            </div>
          </div>
        </div>
      );
    }

    /* ── Screen 1: Sign Up ──────────────────────────────────── */
    function Screen1() {
      return (
        <div style={{display:"flex",height:"100%"}}>
          <div style={{width:"40%",background:C.panel,display:"flex",flexDirection:"column",justifyContent:"center",padding:"18px 14px",position:"relative",overflow:"hidden",flexShrink:0}}>
            <div style={{position:"absolute",width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,rgba(184,146,74,0.13) 0%,transparent 70%)",top:-30,right:-30,pointerEvents:"none"}} />
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:18}}>
              <img src="/static/logo.jpg" style={{width:24,height:24,borderRadius:6,objectFit:"cover",flexShrink:0}} alt="Lumvi" />
              <span style={{fontFamily:"Fraunces,serif",fontSize:12,fontWeight:700,color:C.dark}}>Lumvi</span>
            </div>
            <h2 style={{fontFamily:"Fraunces,serif",fontSize:14,fontWeight:700,color:C.dark,marginBottom:8,lineHeight:1.4}}>Start building your<br/>AI chatbot business</h2>
            <p style={{fontSize:10,color:C.mid,marginBottom:14,lineHeight:1.5}}>Join agencies already using Lumvi to capture leads 24/7.</p>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {[["🤖","AI-powered chatbots"],["🎨","Full white-label branding"],["📊","Lead capture & analytics"],["⚡","Deploy in 30 minutes"]].map(([icon,text]) => (
                <div key={text} style={{display:"flex",alignItems:"center",gap:7,fontSize:10,color:C.mid}}>
                  <div style={{width:20,height:20,borderRadius:5,background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,flexShrink:0}}>{icon}</div>
                  {text}
                </div>
              ))}
            </div>
          </div>
          <div style={{flex:1,background:C.white,display:"flex",alignItems:"center",justifyContent:"center",padding:"18px 14px"}}>
            <div style={{width:"100%",maxWidth:230}}>
              <h1 style={{fontFamily:"Fraunces,serif",fontSize:19,fontWeight:700,color:C.dark,marginBottom:3}}>Create Account</h1>
              <p style={{fontSize:10,color:C.sub,marginBottom:14}}>Start your free trial — no credit card required</p>
              <div style={{marginBottom:9}}>
                <div style={{fontSize:9,fontWeight:600,color:C.mid,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>Email Address</div>
                <div style={{padding:"8px 11px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.sub}}>you@agency.com</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:9}}>
                {["Password","Confirm"].map(l => (
                  <div key={l}>
                    <div style={{fontSize:9,fontWeight:600,color:C.mid,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{l}</div>
                    <div style={{padding:"8px 11px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:11,color:C.sub}}>••••••••</div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:11}}>
                {[["Free","$0/mo"],["Solo","$19/mo"],["Starter","$49/mo"],["Pro","$99/mo"]].map(([n,p],i) => (
                  <div key={n} style={{padding:"7px 9px",border:`1.5px solid ${i===0?C.gold:C.border}`,borderRadius:8,background:i===0?C.goldLt:"transparent"}}>
                    <div style={{fontSize:11,fontWeight:600,color:C.dark}}>{n}</div>
                    <div style={{fontSize:9,color:C.sub}}>{p}</div>
                  </div>
                ))}
              </div>
              <div className="pulse" style={{padding:"10px",background:C.gold,color:"#fff",borderRadius:9,fontSize:12,fontWeight:700,textAlign:"center",cursor:"pointer"}}>
                Create Free Account →
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Screen 2: Build Bot ────────────────────────────────── */
    function Screen2() {
      const tones = [["💼","Professional"],["😊","Friendly"],["🎩","Formal"],["🏄","Casual"],["🔥","Bold"],["💚","Empathetic"]];
      return (
        <WizShell wiz={0} title="Name your bot" sub="Give your AI assistant a name that fits your client's brand.">
          <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.05)",marginBottom:10}}>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:5}}>Bot Name</div>
              <div className="pulse" style={{padding:"9px 12px",border:`1.5px solid ${C.gold}`,borderRadius:9,fontSize:12,color:C.dark,fontWeight:500}}>Pinnacle AI Assistant</div>
            </div>
            <div>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:8}}>Tone & Personality</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {tones.map(([icon,name],i) => (
                  <div key={name} style={{border:`1.5px solid ${i===0?C.gold:C.border}`,borderRadius:9,padding:"9px 6px",textAlign:"center",background:i===0?C.goldLt:C.white,cursor:"pointer"}}>
                    <div style={{fontSize:16,marginBottom:3}}>{icon}</div>
                    <div style={{fontSize:10,fontWeight:600,color:i===0?C.goldDk:C.dark}}>{name}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{padding:"9px 12px",background:C.gold,color:"#fff",borderRadius:9,fontSize:11,fontWeight:700,textAlign:"center",cursor:"pointer"}}>Continue →</div>
        </WizShell>
      );
    }

    /* ── Screen 3: Knowledge Base ───────────────────────────── */
    function Screen3() {
      const faqs = [
        {q:"What are your business hours?",a:"Monday–Friday, 9am–6pm EST."},
        {q:"Do you offer free consultations?",a:"Yes! Book a 30-minute free strategy call."},
        {q:"What payment methods do you accept?",a:"All major credit cards and PayPal."},
      ];
      return (
        <WizShell wiz={1} title="Feed it the business" sub="Your bot learns everything about the client's world.">
          <div className="pulse" style={{background:C.white,border:`1.5px solid ${C.gold}`,borderRadius:12,padding:12,marginBottom:9}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
              <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em"}}>FAQs</div>
              <span style={{padding:"1px 7px",background:C.goldLt,color:C.goldDk,borderRadius:10,fontSize:9,fontWeight:700}}>3</span>
            </div>
            {faqs.map(f => (
              <div key={f.q} style={{background:C.cream,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:600,color:C.dark,marginBottom:2}}>{f.q}</div>
                <div style={{fontSize:9.5,color:C.mid,lineHeight:1.4}}>{f.a}</div>
              </div>
            ))}
            <div style={{padding:"7px",border:`1.5px dashed ${C.border}`,borderRadius:8,textAlign:"center",fontSize:10,color:C.sub,cursor:"pointer"}}>+ Add FAQ</div>
          </div>
          <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:12,padding:11,marginBottom:9}}>
            <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:7}}>Website URL</div>
            <div style={{display:"flex",gap:7}}>
              <div style={{flex:1,padding:"7px 11px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:10.5,color:C.sub}}>https://client-website.com</div>
              <div style={{padding:"7px 12px",background:C.gold,color:"#fff",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer"}}>Scrape</div>
            </div>
          </div>
          <div style={{background:C.white,border:`1.5px dashed ${C.border}`,borderRadius:12,padding:"13px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:16,marginBottom:3}}>📎</div>
            <div style={{fontSize:10,fontWeight:600,color:C.dark,marginBottom:2}}>Upload Documents</div>
            <div style={{fontSize:9,color:C.sub}}>PDF, DOCX, TXT — drag & drop</div>
          </div>
        </WizShell>
      );
    }

    /* ── Screen 4: Customize ────────────────────────────────── */
    function Screen4() {
      return (
        <WizShell wiz={2} title="Make it yours" sub="Your client will never see a Lumvi logo anywhere.">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:11}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:7}}>Brand Color</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:34,height:34,borderRadius:8,background:"#2B4C9B",border:`2px solid ${C.border}`,flexShrink:0}} />
                  <div style={{flex:1,padding:"6px 10px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:7,fontSize:10.5,color:C.dark,fontFamily:"'DM Mono',monospace"}}>#2B4C9B</div>
                </div>
              </div>
              <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:11}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:6}}>Bot Name</div>
                <div style={{padding:"7px 11px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:7,fontSize:10.5,color:C.dark}}>Pinnacle Assistant</div>
              </div>
              <div style={{background:C.white,border:`1.5px solid ${C.border}`,borderRadius:11,padding:11}}>
                <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:C.mid,letterSpacing:"0.07em",marginBottom:6}}>Greeting</div>
                <div style={{padding:"7px 11px",background:C.cream,border:`1.5px solid ${C.border}`,borderRadius:7,fontSize:10,color:C.dark,lineHeight:1.4}}>Hi there! 👋 How can I help?</div>
              </div>
            </div>
            <div className="pulse" style={{border:`1.5px solid ${C.gold}`,borderRadius:13,overflow:"hidden",background:C.white,boxShadow:"0 4px 18px rgba(0,0,0,0.1)"}}>
              <div style={{padding:"10px 12px",background:"#2B4C9B",display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#fff"}}>Pinnacle Assistant</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.65)"}}>● Online</div>
                </div>
              </div>
              <div style={{background:C.cream,padding:10,minHeight:88}}>
                <div style={{background:C.white,borderRadius:"10px 10px 10px 2px",padding:"8px 10px",fontSize:10,color:C.dark,lineHeight:1.5,display:"inline-block",boxShadow:"0 1px 3px rgba(0,0,0,0.07)",maxWidth:"88%"}}>
                  Hi there! 👋 How can I help?
                </div>
              </div>
              <div style={{display:"flex",gap:6,padding:"8px 10px",background:C.white,borderTop:`1px solid ${C.border}`}}>
                <div style={{flex:1,padding:"6px 9px",border:`1.5px solid ${C.border}`,borderRadius:7,fontSize:9.5,color:C.sub}}>Type a message...</div>
                <div style={{width:26,height:26,borderRadius:6,background:"#2B4C9B",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </div>
              </div>
            </div>
          </div>
        </WizShell>
      );
    }

    /* ── Screen 5: Embed Code ───────────────────────────────── */
    function Screen5() {
      const code = `<script\n  src="https://cdn.lumvi.net/widget.js"\n  data-bot-id="pinn_abc123xyz789"\n  data-color="#2B4C9B"\n><\/script>`;
      return (
        <WizShell wiz={3} title="One line of code" sub="Copy. Paste before closing body tag. Done.">
          <div className="pulse" style={{background:"#1C1917",borderRadius:12,padding:"13px 15px",position:"relative",marginBottom:10,border:`1.5px solid ${C.gold}`}}>
            <div style={{position:"absolute",top:10,right:10,padding:"4px 10px",background:"rgba(184,146,74,0.85)",color:"#fff",borderRadius:7,fontSize:10,fontWeight:700,cursor:"pointer"}}>Copy</div>
            <pre style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:"#D4C4A8",lineHeight:1.75,margin:0,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>{code}</pre>
          </div>
          <div style={{padding:"10px 12px",background:"#FFFBEB",borderLeft:"3px solid #D97706",borderRadius:8,marginBottom:10}}>
            <span style={{fontSize:10.5,color:"#92400e",lineHeight:1.5}}>
              💡 Paste this snippet just before <code style={{background:"rgba(0,0,0,0.06)",padding:"1px 4px",borderRadius:3,fontFamily:"'DM Mono',monospace"}}>&lt;/body&gt;</code> on your client's website.

          </div>
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:26,height:26,borderRadius:7,background:C.successLt,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1px solid rgba(22,163,74,0.2)"}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#16A34A" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <span style={{fontSize:10.5,color:C.mid}}>Bot appears on site within <strong style={{color:C.dark}}>30 seconds</strong> of deployment</span>
          </div>
        </WizShell>
      );
    }

    /* ── Screen 6: Dashboard ────────────────────────────────── */
    function Screen6() {
      const stats=[
        {label:"Conversations",value:"284",trend:"+18%",accent:C.gold},
        {label:"Leads Captured",value:"47",trend:"+31%",accent:C.success},
        {label:"Response Rate",value:"98%",trend:"↑ 3pts",accent:"#3B82F6"},
        {label:"Est. Revenue",value:"$3.8k",trend:"+22%",accent:C.warning},
      ];
      const leads=[
        {name:"Sarah Mitchell",email:"s.mitchell@co.com",bot:"Pinnacle AI",date:"Today"},
        {name:"James Okafor",email:"james@growthco.io",bot:"BlueRidge Bot",date:"Yesterday"},
        {name:"Priya Sharma",email:"priya@ventures.io",bot:"Pinnacle AI",date:"Jun 1"},
      ];
      return (
        <div style={{display:"flex",height:"100%"}}>
          <div style={{width:140,background:C.white,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"10px 6px",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"0 6px 10px",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
              <img src="/static/logo.jpg" style={{width:22,height:22,borderRadius:6,objectFit:"cover",flexShrink:0}} alt="Lumvi" />
              <span style={{fontFamily:"Fraunces,serif",fontSize:11,fontWeight:700,color:C.dark}}>Lumvi</span>
            </div>
            {[["📊","Dashboard",true],["🌐","Sales Page",false],["🔗","Affiliate",false],["👥","Clients",false],["⬆️","Upgrade",false]].map(([icon,label,active]) => (
              <div key={label} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 8px",borderRadius:7,background:active?C.goldLt:"transparent",marginBottom:2,cursor:"pointer"}}>
                <span style={{fontSize:11}}>{icon}</span>
                <span style={{fontSize:10,fontWeight:active?600:400,color:active?C.goldDk:C.mid}}>{label}</span>
              </div>
            ))}
            <div style={{flex:1}} />
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"8px 6px",borderTop:`1px solid ${C.border}`}}>
              <div style={{width:22,height:22,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:"serif",fontWeight:700,fontSize:9,flexShrink:0}}>A</div>
              <div><div style={{fontSize:10,fontWeight:600,color:C.dark}}>Agency</div><div style={{fontSize:9,color:C.sub}}>Pro Plan</div></div>
            </div>
          </div>
          <div style={{flex:1,background:C.cream,overflow:"auto"}}>
            <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 14px",height:38,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <span style={{fontFamily:"Fraunces,serif",fontSize:12,fontWeight:700}}>Dashboard</span>
              <span style={{padding:"3px 10px",background:C.goldLt,color:C.goldDk,borderRadius:20,fontSize:9,fontWeight:700,border:"1px solid rgba(184,146,74,0.2)"}}>Pro Plan</span>
            </div>
            <div style={{padding:12}}>
              <div className="pulse" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12,borderRadius:13}}>
                {stats.map(s => (
                  <div key={s.label} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:11,padding:"10px",position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:s.accent}} />
                    <div style={{fontSize:8,color:C.sub,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>{s.label}</div>
                    <div style={{fontFamily:"Fraunces,serif",fontSize:19,fontWeight:700,color:C.dark}}>{s.value}</div>
                    <div style={{fontSize:9,fontWeight:600,color:C.success,marginTop:2}}>{s.trend}</div>
                  </div>
                ))}
              </div>
              <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
                <div style={{padding:"9px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontFamily:"Fraunces,serif",fontSize:12,fontWeight:700}}>Recent Leads</span>
                  <span style={{fontSize:10,color:C.gold,fontWeight:600,cursor:"pointer"}}>Export CSV →</span>
                </div>
                {leads.map((l,i) => (
                  <div key={l.email} style={{display:"flex",alignItems:"center",padding:"9px 12px",borderBottom:i<leads.length-1?`1px solid ${C.border}`:"none",gap:9}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:C.goldLt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.goldDk,fontFamily:"Fraunces,serif",flexShrink:0}}>{l.name[0]}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:11,fontWeight:600,color:C.dark,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</div>
                      <div style={{fontSize:9,color:C.sub,fontFamily:"'DM Mono',monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.email}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:9,color:C.sub,marginBottom:2}}>{l.date}</div>
                      <div style={{fontSize:9,padding:"2px 7px",background:C.goldLt,color:C.goldDk,borderRadius:10,fontWeight:600}}>{l.bot}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Done Screen ────────────────────────────────────────── */
    function DoneScreen({ onRestart }) {
      return (
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"32px 24px",background:C.cream,overflow:"auto"}}>
          <div style={{maxWidth:520,width:"100%",textAlign:"center"}} className="anim-rise">
            <div style={{width:68,height:68,borderRadius:"50%",background:C.successLt,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 22px",border:"2px solid rgba(22,163,74,0.25)"}}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16A34A" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h1 style={{fontFamily:"Fraunces,serif",fontSize:30,fontWeight:800,color:C.dark,marginBottom:12,letterSpacing:"-0.5px",lineHeight:1.2}}>That's the whole product.</h1>
            <p style={{fontSize:14,color:C.mid,lineHeight:1.7,marginBottom:24,fontWeight:300}}>Six steps to a fully deployed, white-labeled AI chatbot on your client's site.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:24,textAlign:"left"}}>
              {STEPS.map(s => (
                <div key={s.n} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:C.white,border:`1px solid ${C.border}`,borderRadius:10}}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:C.successLt,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#16A34A" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>
                  </div>
                  <span style={{fontSize:11,fontWeight:600,color:C.dark}}>{s.title}</span>
                </div>
              ))}
            </div>
            <div style={{padding:"18px 22px",background:C.white,border:"1.5px solid rgba(184,146,74,0.3)",borderRadius:14,marginBottom:24}}>
              <div style={{fontSize:26,color:C.gold,lineHeight:0.8,fontFamily:"Georgia,serif",marginBottom:6}}>"</div>
              <p style={{fontSize:14,color:C.goldDk,fontStyle:"italic",fontWeight:500,lineHeight:1.65,fontFamily:"Fraunces,serif",margin:0}}>
                If you've ever pasted a Facebook Pixel, you already know how to deploy Lumvi.
              </p>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={onRestart} style={{padding:"11px 20px",background:C.white,color:C.mid,border:`1.5px solid ${C.border}`,borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                ← Watch Again
              </button>
              <a href={SIGNUP_URL} target="_parent" className="cta"
                style={{padding:"12px 26px",background:C.gold,color:"#fff",borderRadius:10,fontSize:13,fontWeight:700,boxShadow:"0 4px 16px rgba(184,146,74,0.4)"}}>
                Start Free Trial →
              </a>
            </div>
          </div>
        </div>
      );
    }

    /* ── Main App ───────────────────────────────────────────── */
    const SCREENS = [<Screen1/>, <Screen2/>, <Screen3/>, <Screen4/>, <Screen5/>, <Screen6/>];

    function App() {
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const [dir,  setDir]  = useState(1);

      useEffect(() => {
        const handler = (e) => {
          if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); setDir(1); if (!done) { if (step < 5) setStep(s=>s+1); else setDone(true); } }
          if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { e.preventDefault(); setDir(-1); if (done) { setDone(false); setStep(5); } else if (step > 0) setStep(s=>s-1); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [step, done]);

      const goNext  = () => { setDir(1);  if (!done) { if (step < 5) setStep(s=>s+1); else setDone(true); } };
      const goBack  = () => { setDir(-1); if (done) { setDone(false); setStep(5); } else if (step > 0) setStep(s=>s-1); };
      const jumpTo  = (i) => { setDir(i > step ? 1 : -1); setStep(i); };
      const restart = () => { setDir(1); setStep(0); setDone(false); };

      const cur      = STEPS[step];
      const animCls  = dir === 1 ? "anim-fwd" : "anim-bwd";

      return (
        <div className="demo-root" style={{height:"100vh",display:"flex",flexDirection:"column",background:C.cream,overflow:"hidden"}}>
          <style>{CSS}</style>

          {/* Header */}
          <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,height:50,display:"flex",alignItems:"center",padding:"0 20px",justifyContent:"space-between",flexShrink:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <img src="/static/logo.jpg" style={{width:28,height:28,borderRadius:8,objectFit:"cover",flexShrink:0}} alt="Lumvi" />
              <span style={{fontFamily:"Fraunces,serif",fontSize:15,fontWeight:700,color:C.dark}}>Lumvi</span>
              <div className="hdr-sub" style={{width:1,height:16,background:C.border,margin:"0 4px"}} />
              <span className="hdr-sub" style={{fontSize:12,color:C.sub}}>Product Walkthrough</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span className="kb-hint" style={{fontSize:11,color:C.sub}}>Use ← → keys</span>
              <a href={SIGNUP_URL} target="_parent" className="cta"
                style={{padding:"6px 16px",background:C.gold,color:"#fff",borderRadius:8,fontSize:12,fontWeight:700,boxShadow:"0 2px 8px rgba(184,146,74,0.3)"}}>
                Start Free →
              </a>
            </div>
          </div>

          {/* Body */}
          {done ? (
            <DoneScreen onRestart={restart} />
          ) : (
            <div className="demo-shell" style={{flex:1,display:"flex",overflow:"hidden"}}>

              {/* Left Panel */}
              <div className="left-col" style={{width:340,background:C.white,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",padding:"28px 24px",flexShrink:0,overflow:"hidden",position:"relative"}}>
                <div className="ghost-num" style={{position:"absolute",top:10,right:16,fontFamily:"Fraunces,serif",fontWeight:800,fontSize:80,color:"rgba(184,146,74,0.07)",lineHeight:1,letterSpacing:"-4px",userSelect:"none",pointerEvents:"none"}}>
                  {cur.n}
                </div>
                <div key={`l${step}`} className={animCls} style={{flex:1,display:"flex",flexDirection:"column",position:"relative",zIndex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.09em",color:C.gold}}>{cur.tag}</div>
                    <div style={{flex:1,height:1,background:C.border}} />
                  </div>
                  <h2 className="step-title" style={{fontFamily:"Fraunces,serif",fontSize:28,fontWeight:800,color:C.dark,lineHeight:1.15,marginBottom:cur.time?4:12,letterSpacing:"-0.5px"}}>{cur.title}</h2>
                  {cur.time && <div style={{fontSize:13,color:C.sub,marginBottom:12,fontStyle:"italic"}}>({cur.time})</div>}
                  <p className="step-copy" style={{fontSize:14,color:C.mid,lineHeight:1.75,fontWeight:300}}>{cur.copy}</p>
                  <div className="left-spacer" style={{flex:1}} />
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:20}}>
                    {STEPS.map((_,i) => (
                      <div key={i} onClick={() => jumpTo(i)} style={{height:6,borderRadius:3,background:i===step?C.gold:i<step?C.success:C.border,width:i===step?26:8,cursor:"pointer",transition:"all 0.35s cubic-bezier(0.22,1,0.36,1)",flexShrink:0}} />
                    ))}
                    <div style={{marginLeft:"auto",fontSize:11,color:C.sub,fontFamily:"'DM Mono',monospace"}}>{step+1}/{STEPS.length}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {step > 0 && (
                      <button onClick={goBack} style={{padding:"10px 16px",background:C.white,color:C.mid,border:`1.5px solid ${C.border}`,borderRadius:9,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                        ← Back
                      </button>
                    )}
                    <button onClick={goNext} style={{flex:1,padding:"11px 18px",background:C.gold,color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",boxShadow:"0 3px 14px rgba(184,146,74,0.35)"}}>
                      {step===5 ? "See the Results →" : "Continue →"}
                    </button>
                  </div>
                </div>
              </div>

              {/* Right Panel */}
              <div className="right-col" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",background:C.cream,overflow:"hidden"}}>
                <div key={`s${step}`} className={animCls} style={{width:"100%",maxWidth:660,height:"100%",maxHeight:490,background:C.white,borderRadius:14,border:`1px solid ${C.border}`,boxShadow:"0 8px 40px rgba(0,0,0,0.08)",overflow:"hidden",display:"flex",flexDirection:"column"}}>
                  <div style={{height:32,background:C.panel,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",padding:"0 12px",gap:10,flexShrink:0}}>
                    <div style={{display:"flex",gap:5}}>
                      {["#EF4444","#F59E0B","#10B981"].map(c => <div key={c} style={{width:9,height:9,borderRadius:"50%",background:c}} />)}
                    </div>
                    <div style={{flex:1,maxWidth:230,margin:"0 auto",background:C.white,borderRadius:6,padding:"3px 10px",fontSize:10,color:C.sub,fontFamily:"'DM Mono',monospace",textAlign:"center",border:`1px solid ${C.border}`}}>
                      {cur.url}
                    </div>
                  </div>
                  <div style={{flex:1,overflow:"hidden"}}>{SCREENS[step]}</div>
                </div>
              </div>

            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
